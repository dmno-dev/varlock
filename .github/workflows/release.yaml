name: Release packages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: bumpy-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Wait for the CI test suite to pass before releasing
  wait-for-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI test suite to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI test suite (build-and-test) to complete..."
          for i in $(seq 1 60); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
              --jq '.check_runs[] | select(.name == "build-and-test") | .status + ":" + (.conclusion // "pending")')
            echo "Attempt $i: $STATUS"
            if [[ "$STATUS" == "completed:success" ]]; then
              echo "CI test suite passed!"
              exit 0
            elif [[ "$STATUS" == "completed:"* ]]; then
              echo "::error::CI test suite failed with: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "::error::Timed out waiting for CI test suite"
          exit 1

  # Determine what bumpy will do — only run expensive build/notarize when publishing.
  # Also probe the native-binary caches: if this exact source (+ build scripts +
  # workflows) already produced a signed/notarized binary on a previous run, we
  # reuse it instead of rebuilding and — for macOS — re-notarizing.
  plan:
    needs: wait-for-tests
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      bumpy-version: ${{ steps.bumpy-version.outputs.version }}
      includes-varlock: ${{ contains(fromJSON(steps.plan.outputs.json).packageNames, 'varlock') }}
      includes-vscode: ${{ contains(fromJSON(steps.plan.outputs.json).packageNames, 'env-spec-language') }}
      macos-cache-key: ${{ steps.keys.outputs.macos-cache-key }}
      rust-source-hash: ${{ steps.keys.outputs.rust-source-hash }}
      macos-cache-hit: ${{ steps.macos-cache.outputs.cache-hit }}
      rust-cache-hit: ${{ steps.rust-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      # Pin bumpy to the version committed on main so every release job runs the
      # exact version this repo declares (this job does not `bun install`).
      - id: bumpy-version
        name: Resolve bumpy version
        run: |
          VERSION=$(jq -r '.devDependencies["@varlock/bumpy"] // .dependencies["@varlock/bumpy"]' package.json | sed 's/[\^~]//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - id: plan
        run: bunx "@varlock/bumpy@${{ steps.bumpy-version.outputs.version }}" ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      # Comprehensive content hashes for the native binaries. These cover the
      # native source, the build/bundle scripts, AND the workflows that drive
      # them — anything that can change the produced binary. The leading `v1`
      # salt forces a full rebuild when something hashFiles can't see changes
      # (runner image / Xcode / Rust / UPX toolchain) — bump it to invalidate.
      #
      # Note: the macOS .app bundle embeds a fixed constant version (hardcoded in
      # build-swift.ts, not the npm version), so the notarized bundle is
      # byte-stable across releases — which is what makes cross-release reuse
      # valid. Do not reintroduce a per-release version there.
      - id: keys
        run: |
          MACOS_HASH=${{ hashFiles('packages/encryption-binary-swift/swift/**', 'packages/encryption-binary-swift/scripts/**', 'packages/encryption-binary-swift/package.json', '.github/workflows/build-native-macos.yaml', '.github/workflows/notarize-native-macos.yaml') }}
          RUST_HASH=${{ hashFiles('packages/encryption-binary-rust/Cargo.lock', 'packages/encryption-binary-rust/Cargo.toml', 'packages/encryption-binary-rust/src/**', 'packages/encryption-binary-rust/scripts/**', '.github/workflows/build-native-rust.yaml') }}
          echo "macos-cache-key=native-bin-macos-notarized-v1-$MACOS_HASH" >> "$GITHUB_OUTPUT"
          echo "rust-source-hash=v1-$RUST_HASH" >> "$GITHUB_OUTPUT"

      # Probe caches (lookup-only, no download). cache-hit is 'true' only on an
      # exact key match within this branch's scope (main + its base) — feature
      # branch caches are not visible here, so a release can only reuse a binary
      # produced by a prior run on main.
      - name: Probe macOS notarized binary cache
        id: macos-cache
        if: steps.plan.outputs.mode == 'publish'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/darwin/VarlockEnclave.app
          key: ${{ steps.keys.outputs.macos-cache-key }}
          lookup-only: true
      - name: Probe Rust cache - linux-x64
        id: rust-cache-linux-x64
        if: steps.plan.outputs.mode == 'publish'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/linux-x64/
          key: native-bin-rust-linux-x64-${{ steps.keys.outputs.rust-source-hash }}
          lookup-only: true
      - name: Probe Rust cache - linux-arm64
        id: rust-cache-linux-arm64
        if: steps.plan.outputs.mode == 'publish'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/linux-arm64/
          key: native-bin-rust-linux-arm64-${{ steps.keys.outputs.rust-source-hash }}
          lookup-only: true
      - name: Probe Rust cache - win32-x64
        id: rust-cache-win32-x64
        if: steps.plan.outputs.mode == 'publish'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/win32-x64/
          key: native-bin-rust-win32-x64-${{ steps.keys.outputs.rust-source-hash }}
          lookup-only: true
      - name: Aggregate Rust cache status
        id: rust-cache
        if: steps.plan.outputs.mode == 'publish'
        run: |
          if [[ "${{ steps.rust-cache-linux-x64.outputs.cache-hit }}" == "true" \
             && "${{ steps.rust-cache-linux-arm64.outputs.cache-hit }}" == "true" \
             && "${{ steps.rust-cache-win32-x64.outputs.cache-hit }}" == "true" ]]; then
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi

  # Open/update the "version packages" PR. This is the non-publish path: when
  # bump files are pending on main, bumpy computes versions + changelogs and
  # opens (or refreshes) the release PR. No build/native-binary work is needed —
  # publishing happens later, when that PR merges and `plan` reports `publish`.
  version-pr:
    needs: plan
    if: needs.plan.outputs.mode == 'version-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Push the version branch with BUMPY_GH_TOKEN (below) rather than the
          # default token, so PR workflows trigger on the version branch.
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Create / update version PR
        run: bunx "@varlock/bumpy@${{ needs.plan.outputs.bumpy-version }}" ci release --expect-mode version-pr
        env:
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          GH_TOKEN: ${{ github.token }}

  # Build + sign the macOS native binary. Skipped on a cache hit — the previously
  # notarized bundle is reused and re-verified (see verify-native-macos) instead.
  build-native-macos:
    needs: plan
    if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.macos-cache-hit != 'true'
    uses: ./.github/workflows/build-native-macos.yaml
    with:
      mode: release
      artifact-name: native-bin-macos-signed
    secrets:
      OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

  # Notarize for production npm distribution and cache the notarized bundle so
  # future releases with unchanged source can reuse it.
  notarize-native-macos:
    needs: [plan, build-native-macos]
    if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.macos-cache-hit != 'true'
    uses: ./.github/workflows/notarize-native-macos.yaml
    with:
      source-artifact-name: native-bin-macos-signed
      artifact-name: native-bin-macos-npm
      cache-key: ${{ needs.plan.outputs.macos-cache-key }}
    secrets:
      OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

  # When the notarized bundle is reused from cache (build + notarize skipped),
  # re-verify it on a macOS runner before we trust it in the publish step. This
  # is the safety net for "never publish the wrong thing": a corrupted or
  # un-notarized cached bundle fails here and blocks the release.
  verify-native-macos:
    needs: plan
    if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.macos-cache-hit == 'true'
    runs-on: macos-latest
    steps:
      - name: Restore notarized macOS binary from cache
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/darwin/VarlockEnclave.app
          key: ${{ needs.plan.outputs.macos-cache-key }}
          fail-on-cache-miss: true
      - name: Verify signature, notarization, and function
        run: |
          APP="packages/varlock/native-bins/darwin/VarlockEnclave.app"
          BIN="$APP/Contents/MacOS/varlock-local-encrypt"
          echo "=== codesign verify ==="
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 || true
          echo "=== notarization staple ==="
          xcrun stapler validate "$APP"
          echo "=== gatekeeper assessment (non-fatal) ==="
          spctl -a -t exec -vv "$APP" || true
          echo "=== functional smoke ==="
          chmod +x "$BIN"
          "$BIN" status | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok'], 'status not ok'"
          echo "Cached notarized binary verified"

  # Build Rust native binaries for Linux and Windows. Skipped on a cache hit.
  build-native-rust:
    needs: plan
    permissions:
      contents: read
      id-token: write # Azure OIDC signing in the reusable workflow
    if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit != 'true'
    uses: ./.github/workflows/build-native-rust.yaml
    with:
      artifact-name: native-bin-rust
      source-hash: ${{ needs.plan.outputs.rust-source-hash }}
      sign: true
    secrets:
      OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

  # Publish path: native binaries are ready (built this run or restored from
  # cache), so build the npm packages and publish. Gated on `mode == 'publish'`;
  # the version-PR path is handled by the `version-pr` job above.
  release:
    name: Release
    needs: [plan, notarize-native-macos, verify-native-macos, build-native-rust]
    if: always() && !failure() && !cancelled() && needs.plan.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: write
      packages: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # this is needed so that pushes to the version release branch will use the token we pass in below
          # otherwise the default token will be used, and we will not get an updated pkg.pr.new preview for that branch
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - name: Install node deps
        run: bun install
      - name: Enable turborepo build cache
        uses: rharkor/caching-for-turbo@56219402aacc0d06b650d898c222996dbc1191ec # v2.3.14

      # Ensure npm >= 11.15.0 for OIDC/provenance
      - name: Update npm
        run: npm install -g npm@latest

      # macOS native binary: download the freshly-notarized artifact (cache miss),
      # or restore the previously-notarized bundle from cache (cache hit, already
      # re-verified by verify-native-macos).
      - name: Download macOS native binary (built this run)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.macos-cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          name: native-bin-macos-npm
          path: packages/varlock/native-bins/darwin/VarlockEnclave.app
      - name: Restore macOS native binary (from cache)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.macos-cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/darwin/VarlockEnclave.app
          key: ${{ needs.plan.outputs.macos-cache-key }}
          fail-on-cache-miss: true
      - name: Restore native binary execute permission
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        run: chmod +x packages/varlock/native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt

      # Rust native binaries: download artifacts (cache miss) or restore from cache (hit)
      - name: Download Rust native binaries (built this run)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          name: native-bin-rust-linux-x64
          path: packages/varlock/native-bins/linux-x64
      - name: Download Rust native binaries - linux-arm64 (built this run)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          name: native-bin-rust-linux-arm64
          path: packages/varlock/native-bins/linux-arm64
      - name: Download Rust native binaries - win32-x64 (built this run)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          name: native-bin-rust-win32-x64
          path: packages/varlock/native-bins/win32-x64
      - name: Restore Rust native binaries (from cache)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/linux-x64/
          key: native-bin-rust-linux-x64-${{ needs.plan.outputs.rust-source-hash }}
          fail-on-cache-miss: true
      - name: Restore Rust native binaries - linux-arm64 (from cache)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/linux-arm64/
          key: native-bin-rust-linux-arm64-${{ needs.plan.outputs.rust-source-hash }}
          fail-on-cache-miss: true
      - name: Restore Rust native binaries - win32-x64 (from cache)
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true' && needs.plan.outputs.rust-cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: packages/varlock/native-bins/win32-x64/
          key: native-bin-rust-win32-x64-${{ needs.plan.outputs.rust-source-hash }}
          fail-on-cache-miss: true
      - name: Restore Rust binary execute permissions
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        run: |
          chmod +x packages/varlock/native-bins/linux-x64/varlock-local-encrypt
          chmod +x packages/varlock/native-bins/linux-arm64/varlock-local-encrypt

      # Fail loudly if any native binary is missing before we build the npm package,
      # rather than silently publishing an incomplete package.
      - name: Verify native binaries present
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        run: |
          missing=0
          check() { if [ ! -f "$1" ]; then echo "::error::missing native binary: $1"; missing=1; fi; }
          check packages/varlock/native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt
          check packages/varlock/native-bins/linux-x64/varlock-local-encrypt
          check packages/varlock/native-bins/linux-arm64/varlock-local-encrypt
          check packages/varlock/native-bins/win32-x64/varlock-local-encrypt.exe
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "All native binaries present"

      - name: Generate native binary SHA256 checksums
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        working-directory: packages/varlock
        run: |
          sha256sum \
            native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt \
            native-bins/linux-x64/varlock-local-encrypt \
            native-bins/linux-arm64/varlock-local-encrypt \
            native-bins/win32-x64/varlock-local-encrypt.exe \
            > SHA256SUMS.txt
          echo "Native binary checksums:"
          cat SHA256SUMS.txt
      - name: Upload native binary checksums
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: native-bins-sha256sums
          path: packages/varlock/SHA256SUMS.txt
          retention-days: 90

      # ------------------------------------------------------------
      - name: Build libraries
        run: bun run build:libs
        env:
          BUILD_TYPE: release

      # Resolve VS Code extension publishing secrets from 1Password via varlock
      # (schema lives in packages/vscode-plugin/.env.schema). Only OP_CI_TOKEN is
      # injected here; AZURE_CLIENT_ID / AZURE_TENANT_ID (for OIDC) and OVSX_PAT
      # (for Open VSX) come from the VarlockCI vault and are exported to the job
      # environment for the steps below. (build:libs above provides the local
      # varlock the action uses.)
      - name: Load extension publishing secrets from 1Password
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-vscode == 'true'
        uses: dmno-dev/varlock-action@v1.0.5
        with:
          working-directory: packages/vscode-plugin
        env:
          OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

      # Authenticate to Azure via GitHub OIDC (workload identity federation) so the
      # VS Code Marketplace publish (`vsce publish --azure-credential`) can mint a
      # short-lived token instead of a long-lived VSCE_PAT. The federated credential
      # on the Azure side is scoped to this repo's main branch; see docs below.
      - name: Azure login (OIDC) for Marketplace publishing
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-vscode == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish packages
        run: bunx "@varlock/bumpy@${{ needs.plan.outputs.bumpy-version }}" ci release --expect-mode publish
        env:
          # BUMPY_GH_TOKEN is a bot user PAT used by bumpy to push the version branch and create PRs
          # so that PR workflows (binary-release, etc.) will be triggered
          # (see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/triggering-a-workflow#triggering-a-workflow-from-a-workflow)
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          # VS Code Marketplace auth comes from the Azure OIDC login step above;
          # Open VSX (OVSX_PAT) is loaded into the job env by the varlock step above.

      # Publish the in-run signed/notarized native binaries so the binary
      # distribution jobs below reuse them instead of rebuilding + re-signing.
      - name: Upload staged native binaries
        if: needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: native-bins-staged
          path: packages/varlock/native-bins
          retention-days: 7
          include-hidden-files: true

      # TODO: send notifications?

  # --- varlock CLI binary distribution ---------------------------------------
  # Reuse the signed/notarized native binaries built earlier in THIS run (no
  # rebuild, no re-sign, no Azure/Apple on this path). Gated on a varlock publish;
  # the varlock@<version> GitHub release that bumpy just created is the target.
  release-binaries:
    name: Release varlock CLI binaries
    needs: [plan, release]
    # `release` always has a by-design skipped dependency (the native-binary cache
    # logic skips either verify-native-macos on a miss, or build/notarize on a hit),
    # and GitHub propagates that skip through `release`'s always() into the implicit
    # success() of any downstream job — which would skip this job on every release.
    # Mirror the `release` job's guard to break that propagation.
    if: always() && !failure() && !cancelled() && needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - name: Install node deps
        run: bun install
      - name: Enable turborepo build cache
        uses: rharkor/caching-for-turbo@56219402aacc0d06b650d898c222996dbc1191ec # v2.3.14

      - name: Resolve published varlock version
        id: ver
        run: |
          V=$(node -p "require('./packages/varlock/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=varlock@$V" >> "$GITHUB_OUTPUT"

      # Reuse the native binaries built + signed + notarized earlier this run
      - name: Download staged native binaries
        uses: actions/download-artifact@v8
        with:
          name: native-bins-staged
          path: packages/varlock/native-bins
      - name: Restore native binary execute permissions
        run: |
          chmod +x packages/varlock/native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt
          chmod +x packages/varlock/native-bins/linux-x64/varlock-local-encrypt
          chmod +x packages/varlock/native-bins/linux-arm64/varlock-local-encrypt

      - name: Generate native binary SHA256 checksums
        working-directory: packages/varlock
        run: |
          sha256sum \
            native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt \
            native-bins/linux-x64/varlock-local-encrypt \
            native-bins/linux-arm64/varlock-local-encrypt \
            native-bins/win32-x64/varlock-local-encrypt.exe \
            > SHA256SUMS.txt

      - name: Build libs
        run: bun run build:libs
        env:
          BUILD_TYPE: release
      - name: Build varlock SEA binaries
        run: bun run packages/varlock/scripts/build-binaries.ts

      - name: Upload binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: packages/varlock/dist-sea
        run: gh release upload "${{ steps.ver.outputs.tag }}" *.{tar.gz,zip} checksums.txt ../SHA256SUMS.txt --clobber

      # Update the homebrew tap formula
      - name: Checkout homebrew tap repo
        uses: actions/checkout@v7
        with:
          repository: dmno-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_REPO_GITHUB_ACCESS_TOKEN }}
          path: homebrew-tap
          clean: false
      - name: Update homebrew formula
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: bun run scripts/update-homebrew-formula.ts
      - name: Commit and push homebrew tap update
        run: |
          cd homebrew-tap
          git config --global user.name 'theoephraim'
          git config --global user.email 'theo@dmno.dev'
          git add .
          git commit -m "varlock@${{ steps.ver.outputs.version }}"
          git tag "varlock@${{ steps.ver.outputs.version }}"
          git push origin HEAD --tags

  release-docker:
    name: Release varlock Docker image
    needs: [plan, release-binaries]
    # Same as release-binaries: the upstream skip propagates through always() jobs,
    # so guard with !failure() instead of relying on the implicit success().
    if: always() && !failure() && !cancelled() && needs.plan.outputs.mode == 'publish' && needs.plan.outputs.includes-varlock == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Resolve published varlock version
        id: ver
        run: echo "version=$(node -p "require('./packages/varlock/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/dmno-dev/varlock:${{ steps.ver.outputs.version }}
            ghcr.io/dmno-dev/varlock:latest
          build-args: |
            VARLOCK_VERSION=${{ steps.ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
