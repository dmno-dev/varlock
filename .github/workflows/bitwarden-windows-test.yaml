name: Bitwarden Plugin - Windows Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bitwarden-windows-test:
    name: Test Bitwarden Plugin on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install js deps (w/ bun)
        run: bun install

      - name: Enable turborepo build cache
        uses: rharkor/caching-for-turbo@v2.3.11

      - name: Build libraries
        run: bun run build:libs

      - name: Load bitwarden test schema (token empty - expected to fail validation)
        run: bun run packages/varlock/bin/cli.js load --path smoke-tests/smoke-test-bitwarden/.env.schema
        continue-on-error: true
