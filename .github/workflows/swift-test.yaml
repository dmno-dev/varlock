name: Swift unit tests

# Runs the SessionScoping unit tests on a macOS runner whenever the Swift
# enclave package changes. No secrets / signing / 1Password needed — these are
# pure logic tests of the biometric session-scoping identity against synthetic
# process trees (see Tests/SessionScopingTests).

on:
  pull_request:
    paths:
      - 'packages/encryption-binary-swift/swift/**'
      - '.github/workflows/swift-test.yaml'
  push:
    branches: [main]
    paths:
      - 'packages/encryption-binary-swift/swift/**'
      - '.github/workflows/swift-test.yaml'

permissions:
  contents: read

jobs:
  swift-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # Cache the Swift .build directory so compilation is fast on unchanged source
      - name: Compute Swift source hash
        id: swift-hash
        run: |
          HASH=$(find packages/encryption-binary-swift/swift -type f -not -path '*/.build/*' | sort | xargs shasum -a 256 | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache Swift build artifacts
        uses: actions/cache@v5
        with:
          path: packages/encryption-binary-swift/swift/.build
          key: varlock-swift-test-build-${{ steps.swift-hash.outputs.hash }}
          restore-keys: |
            varlock-swift-test-build-

      - name: Run Swift tests
        working-directory: packages/encryption-binary-swift/swift
        run: swift test
