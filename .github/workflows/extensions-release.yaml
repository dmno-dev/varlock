name: IntelliJ plugin release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or full SHA)
        required: true
        default: main
        type: string
      publish:
        description: Run JetBrains Marketplace publish (validate + build always run)
        required: false
        default: false
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate-intellij:
    name: Validate IntelliJ plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/intellij-plugin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Load plugin env vars (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: packages/intellij-plugin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run IntelliJ plugin tests
        run: ./gradlew test
      - name: Verify plugin compatibility (JetBrains Plugin Verifier)
        run: ./gradlew verifyPlugin

  build-artifacts:
    name: Build IntelliJ plugin artifact
    runs-on: ubuntu-latest
    needs: [validate-intellij]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Load plugin env vars (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: packages/intellij-plugin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build IntelliJ plugin zip
        working-directory: packages/intellij-plugin
        run: chmod +x gradlew && ./gradlew buildPlugin
      - name: Upload IntelliJ artifact
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin-zip
          path: packages/intellij-plugin/build/distributions/*.zip
          if-no-files-found: error

  publish-intellij:
    name: Publish IntelliJ plugin
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'true'
    needs: [build-artifacts]
    defaults:
      run:
        working-directory: packages/intellij-plugin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Load plugin env vars (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: packages/intellij-plugin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish IntelliJ plugin
        run: ./gradlew publishPlugin
