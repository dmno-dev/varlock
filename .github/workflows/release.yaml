name: Release packages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Build and sign the macOS native binary (cache hit if already built in CI)
  build-native-macos:
    uses: ./.github/workflows/build-native-macos.yaml
    with:
      mode: release
      artifact-name: native-bin-macos-signed
    secrets:
      OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

  # Notarize for production npm distribution
  notarize-native-macos:
    needs: build-native-macos
    uses: ./.github/workflows/notarize-native-macos.yaml
    with:
      source-artifact-name: native-bin-macos-signed
      artifact-name: native-bin-macos-npm
    secrets:
      OP_CI_TOKEN: ${{ secrets.OP_CI_TOKEN }}

  release:
    name: Release
    needs: notarize-native-macos
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: write
      packages: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # this is needed so that pushes to the version release branch will use the token we pass in below
          # otherwise the default token will be used, and we will not get an updated pkg.pr.new preview for that branch
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - name: Install node deps
        run: bun install
      - name: Enable turborepo build cache
        uses: rharkor/caching-for-turbo@v2.3.11

      # Ensure npm 11.5.1 or later is installed (for trusted publishing)
      - name: Update npm
        run: npm install -g npm@latest

      # Download signed macOS native binary so it's included in the npm package
      - name: Download macOS native binary
        uses: actions/download-artifact@v8
        with:
          name: native-bin-macos-npm
          path: packages/varlock/native-bins/darwin/VarlockEnclave.app
      - name: Restore native binary execute permission
        run: chmod +x packages/varlock/native-bins/darwin/VarlockEnclave.app/Contents/MacOS/varlock-local-encrypt

      # ------------------------------------------------------------
      - name: Build libraries
        run: bun run build:libs
        env:
          BUILD_TYPE: release

      - name: Create Release PR / Publish
        run: bunx @varlock/bumpy ci release --pat-pr
        env:
          # BUMPY_GH_TOKEN is a bot user PAT used by bumpy to push the version branch and create PRs
          # so that PR workflows (binary-release, etc.) will be triggered
          # (see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/triggering-a-workflow#triggering-a-workflow-from-a-workflow)
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          # these are needed for vscode extension publishing
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # TODO: send notifications?
