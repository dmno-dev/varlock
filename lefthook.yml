pre-commit:
  parallel: true
  jobs:
    - name: eslint
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc}"
      run: bunx eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: branch-name
      run: bun run scripts/check-branch-name.ts
    - name: typecheck
      run: bun run typecheck:all
    - name: bumpy
      run: bunx @varlock/bumpy check
